spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/coinmarketdb?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  cache:
    type: caffeine
    caffeine:
      spec: expireAfterWrite=5m

  task:
    scheduling:
      pool:
        size: 2

  jackson:
    property-naming-strategy: SNAKE_CASE
