services:
  redis:
    image: redis:7
    container_name: coinmarket-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8
    container_name: coinmarket-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CmkDb_2026_R9vQ7mT4zP8sL2nX}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-coinmarketdb}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - coinmarket-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coinmarket-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-coinmarketdb}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CmkDb_2026_R9vQ7mT4zP8sL2nX}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${TZ:-Asia/Shanghai}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  collector:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: coinmarket-collector
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CmkDb_2026_R9vQ7mT4zP8sL2nX}
      DB_NAME: ${MYSQL_DATABASE:-coinmarketdb}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      TZ: ${TZ:-Asia/Shanghai}

  frontend:
    build:
      context: ./frontend/coin-market-web
      dockerfile: Dockerfile
    container_name: coinmarket-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - ai
    ports:
      - "${FRONTEND_PORT:-3000}:80"

  ai:
    build:
      context: ./fastapi-ai
      dockerfile: Dockerfile
    container_name: coinmarket-ai
    restart: unless-stopped
    environment:
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_MODEL: ${AI_MODEL:-deepseek-v4-pro}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.3}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-800}
      AI_STREAM: ${AI_STREAM:-false}
      AI_THINKING_ENABLED: ${AI_THINKING_ENABLED:-true}
      AI_REASONING_EFFORT: ${AI_REASONING_EFFORT:-high}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-30}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-48}
      SPRING_API_BASE_URL: http://backend:8080/api
      SPRING_API_TIMEOUT_SECONDS: ${SPRING_API_TIMEOUT_SECONDS:-10}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      RAG_ROOT_PATH: /workspace
      RAG_INCLUDE_PATHS: ${RAG_INCLUDE_PATHS:-README.md,fastapi-ai,src/main/java,src/main/resources,frontend/coin-market-web/src,scripts}
      RAG_EXCLUDE_DIRS: ${RAG_EXCLUDE_DIRS:-.git,.idea,.vscode,.mvn,.venv,venv,target,node_modules,dist,__pycache__}
      RAG_MAX_FILES: ${RAG_MAX_FILES:-120}
      RAG_MAX_FILE_BYTES: ${RAG_MAX_FILE_BYTES:-200000}
      RAG_CHUNK_CHARS: ${RAG_CHUNK_CHARS:-1400}
      RAG_SNIPPET_CHARS: ${RAG_SNIPPET_CHARS:-1200}
      RAG_MAX_SOURCES: ${RAG_MAX_SOURCES:-5}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-1.2}
      RAG_REINDEX_ON_START: ${RAG_REINDEX_ON_START:-false}
      CHROMA_PERSIST_DIR: /data/chroma
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-project_rag}
      MARKET_TOOLS_ENABLED: ${MARKET_TOOLS_ENABLED:-true}
      MARKET_TOOL_DEFAULT_HISTORY_DAYS: ${MARKET_TOOL_DEFAULT_HISTORY_DAYS:-7}
      MARKET_TOOL_MAX_HISTORY_DAYS: ${MARKET_TOOL_MAX_HISTORY_DAYS:-30}
      MARKET_TOOL_MAX_CONTEXT_CHARS: ${MARKET_TOOL_MAX_CONTEXT_CHARS:-8000}
    depends_on:
      - backend
    ports:
      - "${AI_PORT:-8000}:8000"
    volumes:
      - ./:/workspace:ro
      - coinmarket-chroma-data:/data/chroma

volumes:
  coinmarket-mysql-data:
  coinmarket-chroma-data:
